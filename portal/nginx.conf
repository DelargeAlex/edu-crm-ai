server {
  listen 80;
  server_name _;

  root /srv/project/portal;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /slides/ {
    alias /srv/project/slides/;
    autoindex off;
  }

  location /flowise/ {
    alias /srv/project/flowise/;
    autoindex off;
  }

  location /n8n/ {
    alias /srv/project/n8n/;
    autoindex off;
  }

  location /legacy-case/ {
    alias /srv/project/legacy-freetext-case/;
    autoindex off;
  }

  location /forelasning/ {
    alias /srv/project/föreläsning/;
    autoindex off;
  }
}
