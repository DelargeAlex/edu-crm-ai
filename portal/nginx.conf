server {
  listen 80;
  server_name _;

  root /srv/project/portal;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /slides/ {
    alias /srv/project/slides/;
    autoindex off;
  }

  location /flowise/ {
    alias /srv/project/flowise/;
    autoindex off;
  }

  location /n8n/ {
    alias /srv/project/n8n/;
    autoindex off;
  }

  location /legacy-case/ {
    alias /srv/project/legacy-freetext-case/;
    autoindex off;
  }

  location /forelasning/ {
    alias /srv/project/föreläsning/;
    autoindex off;
  }

  # Same-origin health endpoints for portal status badges.
  location = /health/n8n {
    proxy_pass http://n8n:5678/healthz;
  }

  location = /health/flowise {
    proxy_pass http://flowise:3000/;
  }

  location = /health/chatwoot {
    proxy_pass http://chatwoot:3000/;
  }

  location = /health/twenty {
    proxy_pass http://twenty:3000/healthz;
  }

  location = /health/demo-web {
    proxy_pass http://demo-web:8081/;
  }

  location = /health/legacy {
    proxy_pass http://legacy-ugly-web:8086/;
  }
}
