# Educational demo: n8n + Flowise + Chatwoot + Twenty (see README.md)
services:
  project-index:
    image: nginx:alpine
    ports:
      - "8084:80"
    volumes:
      - ./portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/srv/project:ro
    restart: unless-stopped

  demo-web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8081"
    volumes:
      - ./demo-react:/app
    ports:
      - "8083:8081"
    depends_on:
      - n8n
    restart: unless-stopped

  legacy-ugly-web:
    image: python:3.12-alpine
    working_dir: /app
    command: python /app/server.py
    volumes:
      - ./legacy-freetext-case:/app
    ports:
      - "8085:8086"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Europe/Stockholm
      TZ: Europe/Stockholm
      # Used in workflow expressions: {{ $env.TWENTY_API_KEY }}, etc.
      TWENTY_API_BASE: http://twenty:3000
      TWENTY_API_KEY: ${TWENTY_API_KEY:-}
      # Legacy fallback: workflows fall back to this if more specific ids are empty.
      FLOWISE_CHATFLOW_ID: ${FLOWISE_CHATFLOW_ID:-}
      # Bosses Akvariefiskar: anvand separata chatflows for olika uppgifter.
      FLOWISE_LEAD_CHATFLOW_ID: ${FLOWISE_LEAD_CHATFLOW_ID:-}
      FLOWISE_SUPPORT_CHATFLOW_ID: ${FLOWISE_SUPPORT_CHATFLOW_ID:-}
      FLOWISE_CHATWOOT_CHATFLOW_ID: ${FLOWISE_CHATWOOT_CHATFLOW_ID:-}
      # Chatwoot → n8n → Flowise → svar tillbaka (se README + n8n/workflows/chatwoot.json)
      CHATWOOT_API_BASE: http://chatwoot-rails:3000
      CHATWOOT_API_ACCESS_TOKEN: ${CHATWOOT_API_ACCESS_TOKEN:-}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - flowise
    restart: unless-stopped

  flowise:
    image: flowiseai/flowise:latest
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      # Optional: set your key for real AI answers in Flowise
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./flowise/.flowise:/root/.flowise
    restart: unless-stopped

  chatwoot-rails:
    image: chatwoot/chatwoot:latest
    ports:
      - "3001:3000"
    volumes:
      - chatwoot_storage:/app/storage
    depends_on:
      chatwoot-postgres:
        condition: service_healthy
      chatwoot-redis:
        condition: service_started
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE:-change_me_chatwoot_secret_key_base}
      FRONTEND_URL: http://localhost:3001
      FORCE_SSL: "false"
      ENABLE_ACCOUNT_SIGNUP: "true"
      REDIS_URL: redis://:${CHATWOOT_REDIS_PASSWORD:-chatwootredis}@chatwoot-redis:6379
      REDIS_PASSWORD: ${CHATWOOT_REDIS_PASSWORD:-chatwootredis}
      POSTGRES_HOST: chatwoot-postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${CHATWOOT_POSTGRES_PASSWORD:-chatwootpg}
      POSTGRES_DATABASE: chatwoot_production
      RAILS_MAX_THREADS: 5
      MAILER_SENDER_EMAIL: Chatwoot <noreply@localhost>
      SMTP_DOMAIN: localhost
      SMTP_ADDRESS: localhost
      SMTP_PORT: 25
      SMTP_ENABLE_STARTTLS_AUTO: "false"
      SMTP_AUTHENTICATION: none
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    restart: unless-stopped

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:latest
    volumes:
      - chatwoot_storage:/app/storage
    depends_on:
      chatwoot-postgres:
        condition: service_healthy
      chatwoot-redis:
        condition: service_started
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE:-change_me_chatwoot_secret_key_base}
      FRONTEND_URL: http://localhost:3001
      REDIS_URL: redis://:${CHATWOOT_REDIS_PASSWORD:-chatwootredis}@chatwoot-redis:6379
      REDIS_PASSWORD: ${CHATWOOT_REDIS_PASSWORD:-chatwootredis}
      POSTGRES_HOST: chatwoot-postgres
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: ${CHATWOOT_POSTGRES_PASSWORD:-chatwootpg}
      POSTGRES_DATABASE: chatwoot_production
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    restart: unless-stopped

  chatwoot-postgres:
    image: pgvector/pgvector:pg16
    volumes:
      - chatwoot_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: chatwoot_production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${CHATWOOT_POSTGRES_PASSWORD:-chatwootpg}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatwoot_production"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  chatwoot-redis:
    image: redis:alpine
    command: ["redis-server", "--requirepass", "${CHATWOOT_REDIS_PASSWORD:-chatwootredis}"]
    volumes:
      - chatwoot_redis_data:/data
    restart: unless-stopped

  twenty:
    image: twentycrm/twenty:latest
    ports:
      - "3002:3000"
    volumes:
      - twenty_server_data:/app/packages/twenty-server/.local-storage
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
    environment:
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://postgres:${TWENTY_POSTGRES_PASSWORD:-twentypg}@twenty-db:5432/default
      SERVER_URL: http://localhost:3002
      REDIS_URL: redis://twenty-redis:6379
      APP_SECRET: ${TWENTY_APP_SECRET:-change_me_twenty_app_secret}
      STORAGE_TYPE: local
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  twenty-worker:
    image: twentycrm/twenty:latest
    volumes:
      - twenty_server_data:/app/packages/twenty-server/.local-storage
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
      twenty:
        condition: service_healthy
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgres://postgres:${TWENTY_POSTGRES_PASSWORD:-twentypg}@twenty-db:5432/default
      SERVER_URL: http://localhost:3002
      REDIS_URL: redis://twenty-redis:6379
      APP_SECRET: ${TWENTY_APP_SECRET:-change_me_twenty_app_secret}
      STORAGE_TYPE: local
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
    restart: unless-stopped

  twenty-db:
    image: postgres:16
    volumes:
      - twenty_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: default
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${TWENTY_POSTGRES_PASSWORD:-twentypg}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  twenty-redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  n8n_data:
  chatwoot_storage:
  chatwoot_postgres_data:
  chatwoot_redis_data:
  twenty_db_data:
  twenty_server_data:
